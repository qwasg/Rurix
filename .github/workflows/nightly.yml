# Nightly(CI 三层门禁第二层,14 §8 / milestones/m2/CI_GATES.md §3)
# 自 M2.4 起实体化为最小集(此前 M0/M1 CI_GATES 的 Nightly 条目为纸面描述):
# 前端吞吐冒烟 + GPU 基准冒烟 + 预算 evaluator(normal)+ self-profile 归档。
# self-profile JSON 为归档产物(非证据,趋势参考;evidence/ 分级纪律不适用)。
name: nightly

on:
  schedule:
    - cron: "0 19 * * *"   # 03:00 UTC+8(开发机闲时)
  workflow_dispatch:        # 首跑确认与手动触发通道(schedule 无法 PR 验证)

concurrency:
  group: gpu-runner          # 与 pr-smoke 共享:GPU 任务串行,防基准互扰
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: [self-hosted, Windows, gpu]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: deps
        shell: powershell
        run: py -3 -m pip install -r requirements.txt --quiet --disable-pip-version-check

      - name: lexer throughput smoke (M1 CI_GATES §3)
        shell: powershell
        run: py -3 bench/lexer_bench.py --smoke

      - name: parser throughput smoke (M1 CI_GATES §3)
        shell: powershell
        run: py -3 bench/parser_bench.py --smoke

      - name: SAXPY smoke (M0 GPU 基准回归通道)
        shell: powershell
        run: py -3 bench/saxpy_bench.py --smoke

      - name: compute sanitizer racecheck+memcheck (M5.4 G-M5-4)
        shell: powershell
        # 正确性维度:racecheck + memcheck 包裹全自研 kernel + SAXPY 回归。
        # 不锁频、不做性能采样(严禁污染 measured 基准);非 clean 即 nightly 红。
        run: py -3 bench/compute_sanitizer_run.py

      - name: rx test GPU isolation smoke (M6.3 RXS-0095)
        shell: powershell
        # #[test(gpu)] 分类测试同样经 rx test 子进程隔离路径;完整 GPU 正确性
        # 仍由上方 Compute Sanitizer 全量 kernel 路径覆盖。
        run: |
          cargo build -p rx
          .\target\debug\rx.exe test conformance\toolchain\rx_test_gpu.rx --gpu

      - name: upload compute-sanitizer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compute-sanitizer-${{ github.run_id }}
          path: evidence/compute_sanitizer_*.json
          retention-days: 90

      - name: schema check (G-M5-4 证据当场校验)
        shell: powershell
        run: py -3 ci/check_schemas.py

      - name: budget evaluator (normal)
        shell: powershell
        run: py -3 ci/budget_eval.py

      - name: build rurixc
        shell: powershell
        run: cargo build -p rurixc --bin rurixc

      - name: ui golden snapshot drift check (M5.4 G-M5-3 黄金路径 5)
        shell: powershell
        # 诊断 snapshot 漂移检测:非 bless 模式比对 tests/ui/**/*.stderr。
        # pr-smoke 已在 cargo test --workspace 内覆盖;nightly 串行兜底防主干漂移。
        run: cargo test -p rurixc --test ui_golden

      # —— M6.5 增量(milestones/m6/CI_GATES.md §3;G-M6-2 趋势参考)——
      # LSP 10k 行交互延迟趋势归档:经 rx bench lsp(RD-003 编排)在生成的 10k 行
      # 工程上跑 completion/definition/publishDiagnostics 延迟冒烟(功能哨兵 + 趋势
      # JSON 上传)。CPU 路径,非硬阈门——延迟达标判定在 close-out budget_eval --strict
      # 与 pr-smoke budget evaluator(measured_local 阈值),此处仅趋势参考。
      - name: LSP 10k interaction latency trend archive (M6 CI_GATES §3, G-M6-2 trend)
        shell: powershell
        run: |
          cargo build -p rx --bin rx
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          New-Item -ItemType Directory -Force build\nightly | Out-Null
          .\target\debug\rx.exe bench lsp --smoke --emit=build/nightly/lsp_latency_trend.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Content build\nightly\lsp_latency_trend.json

      - name: upload lsp latency trend artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsp-latency-trend-${{ github.run_id }}
          path: build/nightly/lsp_latency_trend.json
          retention-days: 90

      - name: self-profile archive run (M2 CI_GATES §3, since M2.4)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force build\nightly | Out-Null
          .\target\debug\rurixc.exe conformance\syntax\hello_world.rx -o build\nightly\hello_world.exe --self-profile=build\nightly\self_profile.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Content build\nightly\self_profile.json

      - name: upload self-profile artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-profile-${{ github.run_id }}
          path: build/nightly/self_profile.json
          retention-days: 90
