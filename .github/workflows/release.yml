# Release(CI 三层门禁第三层,14 §8 / milestones/m8/CI_GATES.md §3,RD-001 — M8.4 新建)
# 在打 tag / 发布工作流触发(非每 PR);bench 严格模式 + hard block + 签名/SBOM/许可审计
# + artifact 上传:任一门(签名 / SBOM / 许可审计 / bench strict / conformance/UI golden 全绿 /
# L1 无 Critical 回归)失败 → 不上传 artifact(发布阻断,10 §6 工具链发布门)。
# runner = 开发机 RTX 4070 Ti 自托管(由用户启动 run.cmd,AI 不自启)。
name: release

on:
  push:
    tags:
      # 收窄为 semver 发行 tag(V1.3,契约 §7 ⑪):防 milestone tag(如 v1-closed)
      # 误触发 release workflow——历史 m*/g*-closed tag 均无 v 前缀,v1-closed 首撞。
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:        # 手动触发(发布演练 / 真实红绿验证)

concurrency:
  group: gpu-runner          # 与 pr-smoke / nightly 共用 GPU runner,串行(CI_GATES §1)
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, Windows, gpu]
    timeout-minutes: 45
    env:
      RURIXUP_SIGN: "1"      # Release 层跑真实 Authenticode 签名/验签(自签测试证书,本机);
                            # of-record 生产签名 Azure Artifact Signing 经 secret + 人工门控(spec/release.md §4),不自动调用
      RURIXUP_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: deps
        shell: powershell
        run: py -3 -m pip install -r requirements.txt --quiet --disable-pip-version-check

      # —— hard block 门集(任一红 → 后续 artifact 上传不执行)——

      - name: schema check (CI_GATES §3.2)
        shell: powershell
        run: py -3 ci/check_schemas.py

      - name: guardrails (CI_GATES §3.3)
        shell: powershell
        run: py -3 ci/check_guardrails.py

      - name: traceability matrix freshness (G-M5-5)
        shell: powershell
        run: py -3 ci/trace_matrix.py --check

      # G1.5(RXS-0150)起延续覆盖 cubin/fatbin 真分发产物:cubin/fatbin = Rurix 自编语言本体
      # (由 Rurix 自研 PTX 经 ptxas 预编,非 NvidiaRedist),断言无 __nv_* libdevice 派生符号残留 +
      # 嵌入 cubin/fatbin 为 env!("OUT_DIR") 构建产物(禁打包 NVIDIA 源 cubin/Toolkit)+ 仓库不提交
      # cubin/fatbin 二进制(r6,完整 Toolkit/驱动/Nsight 永不捆绑)。fatbin 产物经既有 rurixup 发布链路
      # 作 LanguageCore 组件进 SBOM + content-tree 完整性(RXS-0135~0139 语义 0-byte,泛型吸收)。
      - name: NVIDIA redistribution whitelist audit (M5.4 / M8.4 / G1.5 cubin·fatbin, r6)
        shell: powershell
        run: py -3 ci/check_redistribution.py

      # bench 严格模式:无容错跳过;estimated 即 FAIL。M8.4 发布链路先于 M8.5
      # 双语覆盖落地,因此 Release 分阶段允许明确 pending 的未来计数器;签名前
      # release_artifacts_signed 尚未生成证据,签名后必须 PASS。
      - name: budget eval --strict pre-release (Release 层 bench 严格模式, CI_GATES §3)
        shell: powershell
        run: py -3 ci/budget_eval.py --strict --allow-pending m8.counter.release_artifacts_signed --allow-pending m8.counter.bilingual_diagnostic_coverage

      - name: cargo fmt check
        shell: powershell
        run: cargo fmt --all --check

      - name: cargo clippy
        shell: powershell
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (conformance / UI golden / unit 全绿)
        shell: powershell
        run: cargo test --workspace

      # 发布链路:签名 + 验签 + SBOM SPDX/CycloneDX + 许可白名单审计 + 发布门 hard-block。
      # 真实 Authenticode 签名(RURIXUP_SIGN=1):未签名/缺 SBOM/白名单外组件 → 发布门红 → 非零退出
      # → 本 job 红 → 不上传 artifact。写 evidence/release_pipeline_smoke.json(signed_artifacts)。
      - name: Release pipeline sign/SBOM/audit gate (G-M8-4, RD-001, RXS-0135~0139)
        shell: powershell
        run: py -3 ci/release_pipeline_smoke.py

      # stable channel 清单冒烟(V1/MR-0008,RXS-0185~0186,步骤 50 同款):green +
      # 确定性 + 漂移注入红(第 8 子门 channel-manifest)+ 未知 channel 红 + 复原绿。
      - name: stable channel manifest smoke (V1 CI_GATES §2.50, G-V1-3, MR-0008)
        shell: powershell
        run: py -3 ci/channel_manifest_smoke.py

      # rurixup 工具链前端冒烟(MR-0009,RXS-0187~0188):install 消费 stable channel →
      # 注册/list/default + 幂等 + 篡改 bundle 红 + 未注册版号红 + 复原绿。纯 host。
      - name: rurixup toolchain frontend smoke (MR-0009, RXS-0187~0188)
        shell: powershell
        run: py -3 ci/toolchain_frontend_smoke.py

      # 计数核对:m8.counter.release_artifacts_signed >=1(发布链路签名产物)。
      - name: budget eval release counter (strict)
        shell: powershell
        run: py -3 ci/budget_eval.py --strict --allow-pending m8.counter.bilingual_diagnostic_coverage

      # 全门绿后方上传发布产物 + SBOM + 签名 / channel 清单(发布门 allow_upload=true 的兑现)。
      - name: upload release artifacts (全门绿后)
        uses: actions/upload-artifact@v4
        with:
          name: rurix-release-${{ github.ref_name }}
          path: |
            evidence/release_pipeline_smoke.json
            target/rurixup_release_smoke/green/sbom.spdx.json
            target/rurixup_release_smoke/green/sbom.cdx.json
            target/rurixup_release_smoke/green/signing_manifest.json
            target/rurixup_release_smoke/green/bundle.json
            target/rurixup_release_smoke/green/channel_manifest.json
            target/rurixup_release_smoke/green/gate_decision.json
          if-no-files-found: error
