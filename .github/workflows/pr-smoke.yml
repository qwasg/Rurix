# PR Smoke(CI 三层门禁第一层,14 §8 / milestones/m0/CI_GATES.md §3)
# runner = 开发机 RTX 4070 Ti 自托管;GPU 步骤失败即红,不静默 skip(P-01)
name: pr-smoke

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: gpu-runner          # 基准互扰防护:GPU 任务串行(CI_GATES.md §1)
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: [self-hosted, Windows, gpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # guardrail 需要完整历史与 tag

      - name: deps
        shell: powershell
        run: py -3 -m pip install -r requirements.txt --quiet --disable-pip-version-check

      - name: structure check (CI_GATES §3.1)
        shell: powershell
        run: py -3 ci/check_structure.py

      - name: schema check (CI_GATES §3.2)
        shell: powershell
        run: py -3 ci/check_schemas.py

      - name: guardrails (CI_GATES §3.3)
        shell: powershell
        run: py -3 ci/check_guardrails.py

      # —— M5 增量(milestones/m5/CI_GATES.md §4 第 6 步;G-M5-5 traceability 延续)——
      # traceability 矩阵新鲜度门禁(check_* 守卫风格,CPU-only,不分配错误码):
      # 入库矩阵与现状不一致或存在未锚定/幽灵锚定即红(消费方 budget_eval 只验非空)。
      - name: traceability matrix freshness (M5 CI_GATES §4.6, G-M5-5)
        shell: powershell
        run: py -3 ci/trace_matrix.py --check

      # —— M5 增量(milestones/m5/CI_GATES.md §4 第 2 项;M5.4 第 5 步 formal 激活)——
      # NVIDIA 再分发面守卫(check_* 风格,CPU-only):嵌入 PTX 无 __nv_* + 源无 libdevice .bc 打包
      - name: NVIDIA redistribution audit (M5 CI_GATES §4.2)
        shell: powershell
        run: py -3 ci/check_redistribution.py

      - name: harness unit tests (CI_GATES §3.4)
        shell: powershell
        run: py -3 -m pytest tests/ -q

      - name: SAXPY load smoke (CI_GATES §3.5, GPU)
        shell: powershell
        run: py -3 bench/saxpy_bench.py --smoke

      - name: budget evaluator load (CI_GATES §3.6)
        shell: powershell
        run: py -3 ci/budget_eval.py

      # —— M1 增量(milestones/m1/CI_GATES.md §2,步骤 7-8;error_codes schema 已并入步骤 2)——
      - name: cargo fmt check (M1 CI_GATES §2.7)
        shell: powershell
        run: cargo fmt --all --check

      - name: cargo clippy (M1 CI_GATES §2.7)
        shell: powershell
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (M1 CI_GATES §2.8)
        shell: powershell
        run: cargo test --workspace

      # —— M2 增量(milestones/m2/CI_GATES.md §2,步骤 12-13;自 M2.3 存在起)——
      - name: hello-world compile loop smoke (M2 CI_GATES §2.12, G-M2-1)
        shell: powershell
        run: py -3 ci/hello_smoke.py compile-run

      - name: cdb breakpoint check (M2 CI_GATES §2.13, G-M2-2)
        shell: powershell
        run: py -3 ci/hello_smoke.py breakpoint

      - name: self-profile check (M2 CI_GATES §2.14, G-M2-4)
        shell: powershell
        run: py -3 ci/hello_smoke.py self-profile

      # —— M3 增量(milestones/m3/CI_GATES.md §2,步骤 15;自 M3.3 存在起)——
      - name: borrowck conformance batch (M3 CI_GATES §2.15, G-M3-1)
        shell: powershell
        run: cargo test -p rurixc --test borrowck_corpus

      # —— M3 增量(milestones/m3/CI_GATES.md §4 第 2 项;M3.3 WP6 MIR golden 激活)——
      - name: MIR golden guardrail (M3 CI_GATES §4.2)
        shell: powershell
        run: cargo test -p rurixc --test mir_golden

      # —— M3 增量(milestones/m3/CI_GATES.md §2 步骤 16;自 M3.4 存在起,G-M3-4)——
      - name: const eval smoke (M3 CI_GATES §2.16, G-M3-4)
        shell: powershell
        run: py -3 ci/consteval_smoke.py compile-run

      # —— M6 增量(milestones/m6/CI_GATES.md §2 步骤 25;自 M6.1 存在起,G-M6-3)——
      # rx CLI 核心子命令端到端真跑(build/run/check/fmt/bench);失败即红。
      # 计数核对经 budget_eval(m6.counter.rx_cli_core_subcommands;建设期 5/6 SKIP)。
      - name: rx CLI core subcommands smoke (M6 CI_GATES §2.25, G-M6-3)
        shell: powershell
        run: py -3 ci/rx_cli_smoke.py

      # —— M6 增量(milestones/m6/CI_GATES.md §2 步骤 26;RD-005 收编,G-M6-4)——
      # rx fmt 幂等门(全 conformance/syntax 语料经 rx fmt 二次格式化 0 diff)。
      - name: rx fmt idempotent gate (M6 CI_GATES §2.26, G-M6-4)
        shell: powershell
        run: py -3 ci/check_fmt_idempotent.py

      # —— M6.2 增量(milestones/m6/CI_GATES.md §2 步骤 27a;D-M6-2,CPU-only)——
      # 包管理离线解析 + rurix.lock 确定性 + 内容树 SHA-256 digest 红绿门
      # (conformance/pkg 样例:rx vendor --offline / --locked 校验;篡改 vendor/lock
      # → RX7008/RX7007 红 → 复原绿;path 源缺失 → RX7009)。失败即红(反 YAML-only)。
      - name: pkg manifest/lock/vendor offline gate (M6 CI_GATES §2.27a, D-M6-2)
        shell: powershell
        run: py -3 ci/pkg_resolve_smoke.py

      # —— M6.3 增量(milestones/m6/CI_GATES.md §2 步骤 27;G-M6-1)——
      # 三包 workspace(path/git/archive)离线重建逐字节复现门:
      # `rx build --locked --offline` 同一路径两次清输出重建 EXE SHA-256 一致,
      # lock/vendor 不改写;脚本内置 vendor digest 篡改 RX7008 红绿验证。失败即红。
      - name: offline rebuild reproducibility gate (M6 CI_GATES §2.27, G-M6-1)
        shell: powershell
        run: py -3 ci/offline_rebuild_repro.py
