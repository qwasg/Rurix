# PR Smoke(CI 三层门禁第一层,14 §8 / milestones/m0/CI_GATES.md §3)
# runner = 开发机 RTX 4070 Ti 自托管;GPU 步骤失败即红,不静默 skip(P-01)
name: pr-smoke

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: gpu-runner          # 基准互扰防护:GPU 任务串行(CI_GATES.md §1)
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: [self-hosted, Windows, gpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # guardrail 需要完整历史与 tag

      - name: deps
        shell: powershell
        run: py -3 -m pip install -r requirements.txt --quiet --disable-pip-version-check

      - name: structure check (CI_GATES §3.1)
        shell: powershell
        run: py -3 ci/check_structure.py

      - name: schema check (CI_GATES §3.2)
        shell: powershell
        run: py -3 ci/check_schemas.py

      - name: guardrails (CI_GATES §3.3)
        shell: powershell
        run: py -3 ci/check_guardrails.py

      # —— M5 增量(milestones/m5/CI_GATES.md §4 第 6 步;G-M5-5 traceability 延续)——
      # traceability 矩阵新鲜度门禁(check_* 守卫风格,CPU-only,不分配错误码):
      # 入库矩阵与现状不一致或存在未锚定/幽灵锚定即红(消费方 budget_eval 只验非空)。
      - name: traceability matrix freshness (M5 CI_GATES §4.6, G-M5-5)
        shell: powershell
        run: py -3 ci/trace_matrix.py --check

      # —— M5 增量(milestones/m5/CI_GATES.md §4 第 2 项;M5.4 第 5 步 formal 激活)——
      # NVIDIA 再分发面守卫(check_* 风格,CPU-only):嵌入 PTX 无 __nv_* + 源无 libdevice .bc 打包
      - name: NVIDIA redistribution audit (M5 CI_GATES §4.2)
        shell: powershell
        run: py -3 ci/check_redistribution.py

      # —— G1.4 增量(milestones/g1/CI_GATES.md §5 第 8 项;MR-0003,check_* 守卫风格,CPU-only)——
      # 贡献校验阻断门(兑现 10 §7「开源后 CI 自动阻断缺 provenance/验证/条款号的 PR」,D-406):
      # 扫 PR 范围(base..HEAD)非 merge commit,三类缺项即红——(1)provenance trailer
      # (Assisted-by/Co-Authored-By);(2)语义改动(src/*.rs 或 spec/*.md)引用条款号 RXS-####;
      # (3)src 改动 commit body 含验证标记。内置 red 自检(反 YAML-only)。不分配错误码/不写
      # evidence/不计 budget。base 默认取 origin/<GITHUB_BASE_REF>(PR)/ origin/main(push)。
      - name: contribution provenance/clause/verification gate (G1 CI_GATES §5.8, G-G1-4, MR-0003)
        shell: powershell
        run: py -3 ci/check_contribution.py

      # —— 编号台账 / 跨分支保留号守卫(MR-0010,check_* 守卫风格,CPU-only,不占数字步骤号)——
      # 兑现 10 §9.5「编号永不复用」的跨分支执行面:off-main 影子分支(如 GRX,closed)可能
      # 消费共享命名空间(MR-0006/0007、RXS-0181~0184);registry/number_ledger.json 登记这些消费,
      # 本门强制两条可靠判定——(1)树内同号异义碰撞(spec `### RXS-####` 头重复 / registry id 重复);
      # (2)已登记 shadow-reserved(对 main 永久 burned)号不得在树内新出现为条款定义 + ledger
      # next_free 跳过树内已用与影子保留。台账引用存在性 advisory 打印不阻断。**能力诚实边界**:
      # CI 只见当前树,无法枚举未合分支,新影子工作流登记是人工/agent 前置动作(不宣称自动发现)。
      # 内置 red 自检(反 YAML-only)。blocking(exit 1)——编号永不复用是抗混乱硬不变式。
      - name: number ledger / cross-branch reservation guard (10 §9.5 execution face, MR-0010)
        shell: powershell
        run: py -3 ci/check_number_ledger.py

      - name: harness unit tests (CI_GATES §3.4)
        shell: powershell
        run: py -3 -m pytest tests/ -q

      - name: SAXPY load smoke (CI_GATES §3.5, GPU)
        shell: powershell
        run: py -3 bench/saxpy_bench.py --smoke

      # —— M7 增量(milestones/m7/CI_GATES.md §2 步骤 29;自 M7.1 存在起,G-M7-4)——
      # core 数学库 Vec/Mat/swizzle 原语 host+device 双路径冒烟:host 结构体 API 真跑
      # marker + device 标量分量原语 codegen IR;写 evidence/stdlib_math_smoke.json
      # 供 budget_eval(m7.counter.math_primitives,>=8 则 PASS)。内建篡改红绿,失败即红。
      - name: stdlib math primitives smoke (M7 CI_GATES §2.29, G-M7-4)
        shell: powershell
        run: py -3 ci/stdlib_math_smoke.py

      # —— M7 增量(milestones/m7/CI_GATES.md §2 步骤 30;自 M7.2 存在起,D-M7-2,CPU-only)——
      # image-io 确定性图像序列输出门:image-io crate 离线构建产 imgio_repro,同一固定
      # 输入两次落盘逐帧 content SHA-256 逐字节一致(PPM P6 确定字节布局,RXS-0116/0117);
      # 内建篡改字节序红绿(check_* 守卫,不写 evidence / 不计 budget counter)。失败即红。
      - name: image-io deterministic image sequence smoke (M7 CI_GATES §2.30, D-M7-2)
        shell: powershell
        run: py -3 ci/image_io_smoke.py

      # —— M7 增量(milestones/m7/CI_GATES.md §2 步骤 31;自 M7.3 存在起,G-M7-3,CPU-only)——
      # G0 软光栅 kernel safe 覆盖 + 确定性帧像素门:软光栅 kernel(binning/tile 光栅/深度/
      # tonemap)device codegen IR 产出(safe 覆盖计数 m7.counter.soft_raster_kernels_safe,
      # 计数源 evidence/soft_raster_*.json 的 safe_kernels 去重基数,>=4 则 PASS)+ host CPU
      # 参考(softraster_repro)固定输入两次落盘逐帧 content SHA-256 逐字节一致(确定性帧像素,
      # RXS-0118~0121);内建篡改帧像素红绿(反 YAML-only)。失败即红。
      - name: soft raster kernel smoke (M7 CI_GATES §2.31, G-M7-3)
        shell: powershell
        run: py -3 ci/soft_raster_smoke.py

      # —— M7 增量(milestones/m7/CI_GATES.md §2 步骤 32;自 M7.4 存在起,G-M7-1,CPU-only)——
      # UC-03 旗舰 demo 单 EXE + 确定性图像序列门:确定性 SPH 仿真 + G0 软光栅出图(uc03-demo
      # crate)经 cargo 产 host 单 EXE,固定初值/固定步长两次运行落盘逐帧 content SHA-256
      # 逐字节一致 + 序列含运动 + 内建篡改帧像素 R/B 通道序红绿(反 YAML-only);写唯一
      # evidence/uc03_demo_smoke.json(image_sequence_ok=true)供 budget_eval
      # (m7.counter.uc03_demo_image_sequence,>=1 则 PASS)。失败即红。
      - name: UC-03 demo single-EXE deterministic image sequence smoke (M7 CI_GATES §2.32, G-M7-1)
        shell: powershell
        run: py -3 ci/uc03_demo_smoke.py

      # —— M8 增量(milestones/m8/CI_GATES.md §2 步骤 34;自 M8.1 存在起,G-M8-1)——
      # UC-01 PyTorch 互操作冒烟:`rx build --emit=pyd` 经 rurixc 编译 device kernel→PTX
      # (PTX-only)+ nanobind + scikit-build-core 打包链接 rurix-interop(C ABI,复用 M5
      # 自研 kernel)产 PYD;PyTorch CUDA 张量经 __cuda_array_interface__ v3 / DLPack 双协议
      # 零拷贝接入,SAXPY/Reduction/GEMM 算子替换端到端真跑 + 与 PyTorch 参考数值对照 +
      # 内建篡改算子数值结果红绿(反 YAML-only);写唯一 evidence/uc01_interop_smoke.json
      # (operators_passed)供 budget_eval(m8.counter.uc01_pytorch_operators,>=3 则 PASS)。
      # 无 CUDA torch/GPU → 降级 SKIP(exit 0)。失败即红。
      - name: UC-01 PyTorch interop smoke (M8 CI_GATES §2.34, G-M8-1)
        shell: powershell
        run: py -3 ci/uc01_interop_smoke.py

      - name: cublas GEMM/GEMV binding smoke (M8 CI_GATES §2.35, G-M8-2)
        shell: powershell
        run: py -3 ci/cublas_binding_smoke.py

      # 步骤 36(G-M8-3):UC-02 三 stream 重叠流水线 + 跨线程所有权转移端到端。host 段对
      # src/uc02-demo/compile-fail/*.rs 四类资源生命周期违例(use-after-free/double-free/
      # 跨 stream 未同步/跨线程非法转移)断言 rustc 100% 编译期拦截(任一放行即红,反 YAML-only);
      # device 段 cargo run -p uc02-demo 三 stream 重叠 + 跨线程转移数值对照;写
      # evidence/uc02_stream_pipeline.json(stream_pipeline_ok)供 budget_eval
      # (m8.counter.uc02_stream_pipeline,>=1 则 PASS)。无 GPU → device 段降级 SKIP(host 拦截段仍跑)。失败即红。
      - name: UC-02 three-stream overlap pipeline smoke (M8 CI_GATES §2.36, G-M8-3)
        shell: powershell
        run: py -3 ci/uc02_stream_pipeline_smoke.py

      # 步骤 37(G-M8-5,RD-006,CPU-only):诊断消息中英双语全量覆盖核对。解析
      # src/rurixc/src/messages/{en,zh}.messages,断言 zh 与 en 的 message-key 集完全对齐
      # (zh 缺键 / zh 多键即红,反 YAML-only;覆盖率核对入发布门 10 §6);全对齐则写
      # evidence/bilingual_diagnostic_coverage.json(coverage_complete)供 budget_eval
      # (m8.counter.bilingual_diagnostic_coverage,>=1 则 PASS)。失败即红。
      - name: bilingual diagnostic coverage gate (M8 CI_GATES §2.37, G-M8-5, RD-006)
        shell: powershell
        run: py -3 ci/bilingual_coverage.py

      # 步骤 38(G-M8-4,RD-001,Release 层前哨):发布链路签名/SBOM/许可审计冒烟。
      # rurixup release 真实调用构造三类子门红场景(未签名 / 缺 SBOM / 白名单外 NVIDIA 组件)
      # 断言发布门 hard-block 阻断(退出码 2,反 YAML-only);PR Smoke 不开真实签名
      # (RURIXUP_SIGN 未设)→ 发布门红绿自检后 normal SKIP(m8.counter.release_artifacts_signed
      # 建设期为 0)。真实 Authenticode 绿(自签测试证书 + 验签 Valid + 写 evidence)在
      # Release workflow(release.yml,tag 触发)与 self-hosted runner 手动 RURIXUP_SIGN=1 跑。失败即红。
      - name: Release pipeline signing/SBOM/audit smoke (M8 CI_GATES §2.38 / §3, G-M8-4, RD-001)
        shell: powershell
        run: py -3 ci/release_pipeline_smoke.py

      # 步骤 39(G-M8-6,CPU-only,check_* 守卫风格,不写 budget counter):文档站 `rx doc` 生成冒烟。
      # cargo build -p rx → rx doc 两次生成 4 关键页(index/spec/errors/traceability)逐字节一致(确定性)
      # + 断言关键页/条款锚点(独立扫 spec/*.md)/错误码索引(error_codes.json)齐备;内置缺页/缺锚点
      # red 自检(反 YAML-only);全绿写 evidence/doc_site_smoke.json。失败即红。
      - name: doc-site `rx doc` generation smoke (M8 CI_GATES §2.39, G-M8-6)
        shell: powershell
        run: py -3 ci/doc_site_smoke.py

      - name: configure Windows GPU toolchain
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $vcvarsCandidates = @()
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
            if ($vsInstall) {
              $vcvarsCandidates += (Join-Path $vsInstall "VC\Auxiliary\Build\vcvars64.bat")
            }
          }
          $vcvarsCandidates += @(
            "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          )
          $vcvars = $vcvarsCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $vcvars) {
            throw "vcvars64.bat not found; real GPU CI requires MSVC C++ tools"
          }

          $vsEnv = @{}
          & cmd.exe /d /c "call `"$vcvars`" >nul && set" | ForEach-Object {
            $parts = $_ -split "=", 2
            if ($parts.Length -eq 2) {
              $vsEnv[$parts[0]] = $parts[1]
            }
          }
          foreach ($name in @(
            "INCLUDE", "LIB", "LIBPATH", "UniversalCRTSdkDir", "UCRTVersion",
            "VCINSTALLDIR", "VCToolsInstallDir", "VSCMD_ARG_HOST_ARCH", "VSCMD_ARG_TGT_ARCH",
            "VSCMD_VER", "VSINSTALLDIR", "WindowsLibPath", "WindowsSdkBinPath",
            "WindowsSdkDir", "WindowsSDKLibVersion", "WindowsSDKVersion"
          )) {
            if ($vsEnv.ContainsKey($name)) {
              "$name=$($vsEnv[$name])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }
          foreach ($entry in (($vsEnv["PATH"] -split ";") | Where-Object { $_ })) {
            $entry | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          $cudaRoots = @()
          if ($env:CUDA_PATH) {
            $cudaRoots += $env:CUDA_PATH
          }
          $cudaBase = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA"
          if (Test-Path $cudaBase) {
            $cudaRoots += (Get-ChildItem $cudaBase -Directory | Sort-Object LastWriteTime -Descending | ForEach-Object { $_.FullName })
          }
          $cuda = $cudaRoots | Where-Object { $_ -and (Test-Path (Join-Path $_ "bin\ptxas.exe")) } | Select-Object -First 1
          if (-not $cuda) {
            throw "CUDA Toolkit with ptxas.exe not found; real GPU CI requires CUDA"
          }
          "CUDA_PATH=$cuda" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $cuda "bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Configured MSVC via $vcvars"
          Write-Host "Configured CUDA_PATH=$cuda"

      # 步骤 40（G-G1-1，RFC-0001 / RXS-0140~0143）：CUDA–D3D12 interop 冒烟。
      # host 段（总跑，无需 GPU/D3D12/MSVC）：--features d3d12-interop 构建（external-resource
      # descriptor + export 的编译期 ABI size const assert 104/88/96/144 + 96，RXS-0143）+ 对
      # src/rurix-rt/compile-fail/*.rs 三类 interop 错误（句柄生命周期 E0382 / 信号时序 E0599 /
      # 跨 context 生成式 brand 逃逸 lifetime，RXS-0140~0142）逐个断言 rustc 拒绝 + red 自检
      # （反 YAML-only：任一应拦截却编译通过即红）。device 段（交互桌面 + Windows SDK D3D12 +
      # --features d3d12-interop-real 真跑）：import 共享 resource/fence → kernel 写共享 buffer →
      # 信号量同步端到端数值对照 → interop_ok；无 D3D12/GPU/窗口 → 降级 SKIP(exit 0)。写
      # evidence/d3d12_interop_*.json 的 interop_ok 计入 g1.counter.d3d12_interop（建设期未落地
      # → 0 → normal SKIP 属预期）。失败即红。
      - name: CUDA–D3D12 interop smoke (G1 CI_GATES §2.40, G-G1-1, RFC-0001)
        shell: powershell
        env:
          RURIX_REQUIRE_REAL: "1"
        run: py -3 ci/d3d12_interop_smoke.py

      # 步骤 41（G-G1-1，RFC-0001 / RXS-0142~0143）：软光栅实时窗口呈现冒烟。
      # host 段（总跑，无需窗口/GPU/MSVC）：--features d3d12-present 构建 uc03-demo，证 present
      # 通路 + interop scope 帧 typestate（Ready→Acquired→Presentable）+ 偶/奇 fence handoff
      # 类型面编译通过（present 同步序由类型系统保证，RXS-0142）。G0 kernel sr_*.rx 0-byte。
      # device 段（交互桌面 + Windows SDK D3D12 + --features d3d12-present-real 真跑）：G0 kernel
      # 写共享 buffer → fence 同步 → present pass → 窗口 Present 帧像素对照 → present_ok；无窗口/
      # 显示 → 降级 SKIP(exit 0)。写 evidence/realtime_present_*.json 的 present_ok 计入
      # g1.counter.realtime_present（建设期未落地 → 0 → normal SKIP 属预期）。失败即红。
      - name: realtime window present smoke (G1 CI_GATES §2.41, G-G1-1, RFC-0001)
        shell: powershell
        env:
          RURIX_REQUIRE_REAL: "1"
        run: py -3 ci/realtime_present_smoke.py

      # 步骤 42（G-G1-2，MR-0001 / RXS-0144~0148）：流序分配 AsyncBuffer 冒烟。
      # host 段（总跑，无需 GPU）：默认构建 rurix-rt（AsyncBuffer<'stream,T> 随 rurix-rt 始终编译，
      # 无 feature 门控，镜像 InFlight）+ 对 src/rurix-rt/compile-fail/async_buffer_*.rs 三类流序
      # 分配错误（分配未完成访问 E0599 / 释放后访问 E0382 / 跨 stream 未同步 E0599，RXS-0145~0148）
      # 逐个断言 rustc 拒绝 + red 自检（反 YAML-only：任一应拦截却编译通过即红）。device 段（GPU +
      # cuMemAllocAsync 真跑）：三 stream 流序分配 + 两条 share_with 跨 stream 时序边 + 往返数值对照
      # → pipeline_ok；无 GPU/老驱动无流序分配 → 降级 SKIP(exit 0)。写 evidence/async_buffer_*.json
      # 的 pipeline_ok 计入 g1.counter.async_buffer_pipeline（建设期未落地 → 0 → normal SKIP 属预期）。
      # device 路径并入 Compute Sanitizer nightly（CUDA.jl #780 事故类回归）。失败即红。
      - name: AsyncBuffer stream-ordered allocation smoke (G1 CI_GATES §2.42, G-G1-2, MR-0001)
        shell: powershell
        env:
          RURIX_REQUIRE_REAL: "1"
        run: py -3 ci/async_buffer_smoke.py

      # 步骤 43（G-G1-3，MR-0002 / RXS-0149）：首个引擎集成冒烟。
      # host 段（总跑，无需 MSVC/GPU）：cargo build -p rurix-engine 产 cdylib（rurix_engine.dll +
      # import lib，复用 M8.1 既有 extern "C" C ABI RXS-0125 语义 0-byte）+ 校验随附头文件
      # （include/rurix_engine.h）声明集 == ffi.rs `extern "C"` 导出集 == EXPORTED_C_ABI（头↔ABI
      # 逐一对应，RXS-0149）+ red 自检（导出集漂移即红）。device 段（交互桌面 + MSVC + Windows
      # SDK D3D12 + CUDA Toolkit + GPU 真跑）：cl 编译 src/rurix-engine/harness/engine_host.cpp 链接
      # rurix_engine.dll.lib + cudart + d3d12/dxgi → 自建最小 C++/D3D12 render-graph 上下文（LUID
      # 匹配 adapter）调 Rurix DLL SAXPY compute pass → 设备数值对照 out==a*x+y → integration_ok；
      # 无 MSVC/CUDA/GPU → 降级 SKIP(exit 0)。写 evidence/engine_integration_*.json 的 integration_ok
      # 计入 g1.counter.engine_integration（建设期未落地 → 0 → normal SKIP 属预期）。失败即红。
      - name: first engine integration smoke (G1 CI_GATES §2.43, G-G1-3, MR-0002)
        shell: powershell
        env:
          RURIX_REQUIRE_REAL: "1"
        run: py -3 ci/engine_integration_smoke.py

      # 步骤 44（G-G1-5，MR-0005 / RXS-0150~0152，**check_* 守卫风格，不写 budget counter**）：
      # 生产分发 fatbin 冒烟。host 段（总跑）：三类构造缺陷红绿自检（白名单外 cubin 组件 /
      # 缺 [[artifact]] digest / cubin↔PTX golden 漂移）+ 真实 ci/check_redistribution.py（cubin/fatbin
      # 延续：无 __nv_* 残留 / 不打包 libdevice .bc·Toolkit·驱动·Nsight，r6）。device 段（ptxas +
      # CUDA + GPU 真跑）：build.rs 按架构预编 cubin（ptxas -arch=sm_89）→ fatbin_saxpy 经
      # load_module_artifacts 装载协商（cubin 命中即用 / 未命中降级保守 PTX fallback，RXS-0151，降级
      # 而非 reject）→ SAXPY 设备数值对照 → distribution_ok；无 ptxas/GPU → 降级 SKIP(exit 0)。
      # 写 evidence/fatbin_dist_smoke.json。守卫「应红却放行」/ 真实审计红 / device 数值对照失败即红。
