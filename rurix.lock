# rurix.lock — Rurix 仓库级供应链 pin（手工维护；`rx vendor` 生成的是 per-workspace
# 包锁，与本文件互不影响）。本文件以内容寻址（SHA256）pin 图形=B 路（RFC-0004 §4.2）
# 外部转译工具链：MIR→SPIR-V 自有降级后，经 SPIRV-Cross→dxc→DXIL 的外部工具须可复现。
#
# 体例承既有 `[[artifact]]` digest pin（RXS-0152，内容寻址）/ D-205 LLVM 单栈 pin 纪律：
# 每条 `[[toolchain]]` 记 name/role/version/file/sha256（SHA256 取自命令真实输出
# `Get-FileHash -Algorithm SHA256`）。canonical 形态锁本文件；env override
# （`RURIX_SPIRV_CROSS`/`RURIX_DXC`/`RURIX_DXC_DIR`/`RURIX_SPIRV_VAL`，见
# src/rurixc/src/toolchain.rs）**仅** dev/probe 取证用，**不**构成 CI/stable path
# （RFC-0004 §9 Q-Supply；spec/dxil_backend.md RXS-0162 IR4）。
#
# 再分发审计随 registry/deferred.json **RD-014**（本文件仅引用，不在此完成法律签署）。
# 本机实测候选（Vulkan SDK 1.3.296.0；dxc 1.8.0.4739 / SPIRV-Cross
# vulkan-sdk-1.3.290.0-44-g65d73934 / SPIRV-Tools v2024.4）；签名 validator
# （dxil.dll / dxv.exe）不随 Vulkan SDK 分发，归 agent pin 环境（device 真跑 / golden
# bless）。CI 转译链冒烟见 ci/dxil_codegen_smoke.py（CI 步骤 46）。
